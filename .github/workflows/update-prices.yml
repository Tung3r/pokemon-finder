name: Daily Price Refresh

on:
  schedule:
    - cron: '0 8 * * *'   # 8am UTC daily (covers overnight US price updates)
  workflow_dispatch:        # Allow manual trigger from GitHub Actions tab

permissions:
  contents: write           # Needed to commit updated data/cards.ts

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch latest card data and prices
        run: python scripts/fetch_cards.py
        env:
          POKEMONTCG_API_KEY: ${{ secrets.POKEMONTCG_API_KEY }}

      - name: Commit updated prices
        run: |
          git config user.name "Pokemon Price Bot"
          git config user.email "bot@noreply.github.com"
          git add data/cards.ts
          # Only commit if cards.ts actually changed
          git diff --staged --quiet || git commit -m "chore: daily price refresh $(date -u +%Y-%m-%d)"
          git push
